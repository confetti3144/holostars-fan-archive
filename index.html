    --surface: #F6F6F8;
    --surface2: #AFF7E3;
    --border: #F5F5F5;
    --accent: #266AFF;
    --accent2: #ff6a9b;
    --accent3: #1C1C1C;
    --text: #1C1C1C;
    --text-dim: #7a7a90;
    --text-dimmer: #3a3a50;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  header {
    border-bottom: 5px solid var(--border);
    padding: 0 2rem;
    position: sticky;
    top: 0;
    background: #AFF7E3;
    backdrop-filter: blur(12px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 55px;

  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 0.2em; color: var(--text); cursor: pointer; }

  .header-meta { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.2em; }

  .hero { padding: 4rem 3rem 4rem; max-width: 1100px; margin: 0 auto; }
  .hero-eyebrow { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--accent); letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 1rem; }
  .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3.5rem, 2vw, 2rem); line-height: 1.2; letter-spacing: 0.02em; margin-bottom: 0.5rem; }
  .hero h1 em { font-style: normal; color: var(--accent); display: block; }
  .hero-desc { font-size: 0.9rem; color: var(--text-dim); max-width: 480px; line-height: 1.8; margin-bottom: 2rem; }
  .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }

  .btn { font-family: 'Space Mono', monospace; font-size: 0.72rem; letter-spacing: 0.1em; padding: 0.7rem 1.4rem; border: 1px solid var(--accent); color: var(--accent); background: transparent; cursor: pointer; text-decoration: none; transition: all 0.2s; display: inline-block; }
  .btn:hover { background: var(--accent); color: var(--bg); }
  .btn-ghost { border-color: var(--border); color: var(--text-dim); }
  .btn-ghost:hover { border-color: var(--text-dim); background: transparent; color: var(--text); }

  .divider { max-width: 1100px; margin: 0 auto; padding: 0 2rem; display: flex; align-items: center; gap: 1rem; margin-bottom: 2.5rem; }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-label { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--text-dimmer); letter-spacing: 0.2em; white-space: nowrap; }

  .members-section { max-width: 1100px; margin: 0 auto; padding: 0 2rem 5rem; }
  .gen-group { margin-bottom: 3rem; }
  .gen-label { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.25em; color: var(--text-dimmer); padding: 0.5rem 0; border-bottom: 1px solid var(--border); margin-bottom: 1px; }

  .members-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); }

  .member-card { background: var(--surface); padding: 1.5rem 1.3rem; cursor: pointer; transition: background 0.2s; position: relative; overflow: hidden; }
  .member-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--member-color, var(--accent)); transform: scaleX(0); transform-origin: left; transition: transform 0.3s; }
  .member-card:hover { background: var(--surface2); }
  .member-card:hover::before { transform: scaleX(1); }

  .member-color-dot { border-radius: 80%; width: 20px; height: 20px; display: inline-block; margin-bottom: 0.3rem;clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
  .member-name { font-family: "Kosugi", sans-serif;font-weight: 600;  font-style: normal;; font-size: 1.2rem; letter-spacing: 0.05em; color: #1C1C1C; margin-bottom: 0.2rem; line-height: 1.0; }
  .member-name-ja { font-size: 1.0rem; letter-spacing: 0.0em; color: #266AFF; margin-bottom: 0.8rem; }
  .member-tag { display: inline-block; font-family: 'Space Mono', monospace; font-size: 0.58rem; padding: 0.15rem 0.45rem; border: 1px solid var(--border); color: var(--text-dim); margin-right: 0.25rem; margin-bottom: 0.25rem; }
  .member-count { margin-top: 1rem; font-family: 'Space Mono', monospace; font-size: 0.62rem; color: var(--text-dimmer); }
  .member-count strong { color: var(--accent3); }

  .member-page { display: none; }
  .home-page.hidden { display: none; }

  .back-btn { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--text-dim); cursor: pointer; padding: 1.2rem 2rem; display: inline-flex; align-items: center; gap: 0.5rem; border: none; background: none; transition: color 0.2s; letter-spacing: 0.05em; }
  .back-btn:hover { color: var(--text); }

  .member-profile { max-width: 1100px; margin: 0 auto; padding: 0 2rem 2rem; display: grid; grid-template-columns: 260px 1fr; gap: 3rem; align-items: start; }
  @media (max-width: 700px) { .member-profile { grid-template-columns: 1fr; gap: 1.5rem; } }

  .profile-left { position: sticky; top: 80px; }
  .profile-avatar { width: 100%; aspect-ratio: 1; background: #F6F6F6 ; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 4rem; margin-bottom: 1.2rem; position: relative; overflow: hidden; }
  .profile-avatar .initials { position: absolute; }
  .profile-gen-badge { font-family: 'Space Mono', monospace; font-size: 0.62rem; letter-spacing: 0.2em; color: var(--text-dim); margin-bottom: 0.4rem; }
  .profile-name { font-family: 'Bebas Neue', sans-serif; font-size: 2.6rem; letter-spacing: 0.04em; line-height: 0.95; margin-bottom: 0.3rem; }
  .profile-name-ja { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 1.2rem; }
  .profile-bio { font-size: 0.85rem; line-height: 1.9; color: var(--text-dim); margin-bottom: 1.5rem; }
  .profile-links { display: flex; flex-direction: column; gap: 0.5rem; }

  .profile-link:hover { border-color: var(--member-color, var(--accent)); color: var(--member-color, var(--accent)); }
  .profile-tags { margin-top: 1.2rem; display: flex; flex-wrap: wrap; gap: 0.3rem; }

  .posts-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .posts-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.06em; }
  .posts-count { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--text-dim); }

  .post-card { background: var(--surface); border: 1px solid var(--border); margin-bottom: 1px; transition: border-color 0.2s; }
  .post-card:hover { border-color: var(--member-color, var(--accent)); }
  .post-video-wrap { position: relative; padding-bottom: 50%; background: #F6F6F6 ; overflow: hidden; }

  .post-image-wrap { background: #F6F6F6; overflow: hidden; max-height: 320px; }

  .post-card:hover .post-image-wrap img { transform: scale(1.02); }
  .post-body { padding: 1.2rem 1.4rem; }
  .post-meta-top { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.8rem; flex-wrap: wrap; }
  .post-type-badge { font-family: 'Space Mono', monospace; font-size: 0.58rem; letter-spacing: 0.15em; padding: 0.15rem 0.5rem; text-transform: uppercase; }

  .post-date { font-family: 'Space Mono', monospace; font-size: 0.62rem; color: var(--text-dimmer); }

  footer { border-top: 1px solid var(--border); padding: 1.5rem 2rem; max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
  .footer-note { font-family: 'Space Mono', monospace; font-size: 0.62rem; color: var(--text-dimmer); line-height: 1.6; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.5s ease both; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

const GEN_ORDER = ["一期生", "二期生", "三期生", "UPROAR!!"];

function renderMembersGrid() {
  const container = document.getElementById('membersContainer');
  const grouped = {};
  GEN_ORDER.forEach(g => grouped[g] = []);

    if (!grouped[m.gen]) grouped[m.gen] = [];
    grouped[m.gen].push(m);
  });

  container.innerHTML = GEN_ORDER.map(gen => {
    if (!grouped[gen] || grouped[gen].length === 0) return '';
    return `
      <div class="gen-group">
        <div class="gen-label">HOLOSTARS ${gen}</div>
        <div class="members-grid">
          ${grouped[gen].map(m => `
            <div class="member-card fade-up" style="--member-color:${m.color}" onclick="showMember('${m.id}')">
              <div class="member-color-dot" style="background:${m.color}"></div>
              <div class="member-name">${m.name}</div>
              <div class="member-name-ja">${m.nameJa}</div>
              ${m.tags.filter(Boolean).map(t => `<span class="member-tag">${t}</span>`).join('')}
              <div class="member-count"><strong>${m.posts.length}</strong> 篇投稿</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function showMember(id) {
  const m = DATA.members.find(x => x.id === id);
  if (!m) return;

  document.getElementById('memberProfile').innerHTML = `
    <div class="profile-left fade-up" style="--member-color:${m.color}">
      <div class="profile-avatar" style="border-color:${m.color}40;">
        <span class="initials" style="color:${m.color};">${m.name[0]}</span>
      </div>
      <div class="profile-gen-badge">HOLOSTARS ${m.gen}</div>
      <div class="profile-name" style="color:${m.color};">${m.name}</div>
      <div class="profile-name-ja">${m.nameJa}</div>
      ${m.bio ? `<p class="profile-bio">${m.bio}</p>` : ''}
      <div class="profile-links">
        ${m.links.map(l => `
          <a class="profile-link" href="${l.url}" target="_blank" rel="noopener" style="--member-color:${m.color}">
            <span>${l.icon}</span>${l.label}
          </a>
        `).join('')}
      </div>
      ${m.tags.filter(Boolean).length ? `
        <div class="profile-tags">
          ${m.tags.filter(Boolean).map(t => `<span class="member-tag">${t}</span>`).join('')}
        </div>` : ''}
    </div>
    <div id="postsColumn"></div>
  `;

  document.getElementById('postsLabel').textContent = `POSTS · ${m.name}`;
  document.getElementById('postsCount').textContent = `${m.posts.length} 篇投稿`;

  const container = document.getElementById('postsContainer');
  if (m.posts.length === 0) {
    container.innerHTML = `
      <div style="padding:3rem;text-align:center;border:1px dashed var(--border);">
        <p style="font-family:'Space Mono',monospace;font-size:0.72rem;color:var(--text-dimmer);letter-spacing:0.1em;">
          還沒有投稿——成為第一個吧
        </p>
      </div>`;
  } else {
    container.innerHTML = m.posts.map(p => renderPost(p, m.color)).join('');
  }

  document.getElementById('homePage').classList.add('hidden');
  document.getElementById('memberPage').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderPost(p, color) {
  const badgeClass = { video:'badge-video', image:'badge-image', text:'badge-text' }[p.type];
  const badgeLabel = { video:'影片', image:'圖片', text:'文字', trans:'翻譯' }[p.type];

  let mediaHtml = '';
  if (p.type === 'video' && p.videoId) {
    mediaHtml = `
      <div class="post-video-wrap">
        <iframe src="https://www.youtube.com/embed/${p.videoId}"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen loading="lazy"></iframe>
      </div>`;
  } else if (p.type === 'image' && p.image) {
    mediaHtml = `
      <div class="post-image-wrap">
        <img src="${p.image}" alt="投稿圖片" loading="lazy">
      </div>`;
  }

  const authorHtml = p.authorUrl
    ? `<a href="${p.authorUrl}" target="_blank" rel="noopener">${p.author}</a>`
    : `<span style="color:var(--text-dim)">${p.author}</span>`;

  return `
    <div class="post-card" style="--member-color:${color}">
      ${mediaHtml}
      <div class="post-body">
        <div class="post-meta-top">
          <span class="post-type-badge ${badgeClass}">${badgeLabel}</span>
        </div>
        <p class="post-desc">${p.desc}</p>
        ${p.moe ? `<div class="post-moe">${p.moe}</div>` : ''}
        <div class="post-meta-bottom">
          <div class="post-author">BY ${authorHtml}</div>
          <div class="post-date">${p.date}</div>
        </div>
      </div>
    </div>
  `;
}

function showHome() {
  document.getElementById('memberPage').style.display = 'none';
  document.getElementById('homePage').classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderMembersGrid();
</script>
</body>
</html>
